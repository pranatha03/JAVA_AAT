<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports — Expense Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="/js/script.js" defer></script>
</head>

<body>

<nav class="navbar">
  <div class="logo">ExpenseTracker</div>
  <div class="nav-links">
    <a href="/dashboard.html">Dashboard</a>
    <a href="/reports.html">Reports</a>
    <a href="/budget.html">Budget</a>
    <a href="/add-expense.html">Add Expense</a>
  </div>
</nav>

<section class="page-header">
  <h1>Expense Analytics</h1>
  <p>Understand where your money goes.</p>
</section>

<section class="stats">
  <div class="card">
    <span>Total Spent</span>
    <h2 id="totalSpent">₹—</h2>
  </div>
  <div class="card">
    <span>Transactions</span>
    <h2 id="txCount">—</h2>
  </div>
  <div class="card">
    <span>Top Category</span>
    <h2 id="topCategory">—</h2>
  </div>
</section>

<section class="report-card">
  <h2>Expense Breakdown</h2>
  <div id="breakdown"><p style="color:#6b7280">Loading...</p></div>
</section>

<section class="table-card">
  <h2>Recent Expenses</h2>
  <table>
    <thead>
      <tr>
        <th>Description</th>
        <th>Amount</th>
        <th>Category</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="expenseTable">
      <tr><td colspan="4" style="color:#6b7280;text-align:center;padding:20px">Loading...</td></tr>
    </tbody>
  </table>
</section>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/script.js"></script>
</head>

<body>

<nav class="navbar">
    <div class="logo">ExpenseTracker</div>

    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/reports">Reports</a>
        <a href="/budget">Budget</a>
        <a href="/add-expense">Add Expense</a>
    </div>
</nav>

<section class="page-header">
    <h1>Expense Analytics</h1>
    <p>Understand where your money goes.</p>
</section>

<section class="stats">

    <div class="card">
        <span>Total Spent</span>
        <h2>₹15,000</h2>
    </div>

    <div class="card">
        <span>Transactions</span>
        <h2>24</h2>
    </div>

    <div class="card">
        <span>Top Category</span>
        <h2>Food</h2>
    </div>

</section>

<section class="report-card">

<h2>Expense Breakdown</h2>

<div class="progress-item">
    <span>Food</span>
    <div class="progress"><div style="width:70%"></div></div>
</div>

<div class="progress-item">
    <span>Travel</span>
    <div class="progress"><div style="width:45%"></div></div>
</div>

<div class="progress-item">
    <span>Bills</span>
    <div class="progress"><div style="width:30%"></div></div>
</div>

</section>

<section class="table-card">

<h2>Recent Expenses</h2>

<table>

<tr>
<th>Description</th>
<th>Amount</th>
<th>Category</th>
</tr>

<tr>
<td>Groceries</td>
<td>₹2000</td>
<td>Food</td>
</tr>

<tr>
<td>Fuel</td>
<td>₹1500</td>
<td>Travel</td>
</tr>

</table>

</section>

</body>
</html>
